name: Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v2

      - name: Build Docker Image via Nix
        run: |
          sudo chmod 755 /run/containers
          sudo mkdir -p "/run/containers/$(id -u runner)"
          sudo chown runner: "/run/containers/$(id -u runner)"
          nix-build --option sandbox false docker.nix -o pantomime.tar.gz
        env:
          NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1

      - name: Verify Build
        run: |
          if [ -L pantomime.tar.gz ]; then
            echo "Build successful! pantomime.tar.gz created."
          else
            echo "Build failed! pantomime.tar.gz not found."
            exit 1
          fi

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pantomime
          path: pantomime.tar.gz
          retention-days: 7
